name: Release Nickelback

on:
  repository_dispatch:
  push:
    tags:
    - "Nickelback-v[0-9]+.[0-9]+.[0-9]+*"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:

  release:
    name: Release Nickelback
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Verify commit
        run: |
          git branch --remote --contains | grep origin/main

      - name: Set version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/Nickelback-v/}" >> $GITHUB_ENV

      - name: Set version in modinfo.json
        run: |
          jq --arg v "$VERSION" '.version = $v' Nickelback/modinfo/bitzartnickelback/modinfo.json > tmp.json && mv tmp.json Nickelback/modinfo/bitzartnickelback/modinfo.json

      - name: Build
        run: dotnet build Nickelback/Nickelback.slnx --configuration Release -p:Version="$VERSION"

      - name: Publish
        run: |
          dotnet publish ./Nickelback/Nickelback/Nickelback.csproj -o ./release/${VERSION}/src
          mv ./release/${VERSION}/Nickelback.zip ./release/${VERSION}/Nickelback_v${VERSION}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ⛏️ Nickelback v${{ env.VERSION }}
          make_latest: true
          files: |
            release/${{ env.VERSION }}/Nickelback_v${{ env.VERSION }}.zip